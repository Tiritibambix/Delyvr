<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-tertiary: #1c1c1f;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --accent: #c9a962;
            --accent-hover: #dfc07a;
            --border: #2d2d30;
        }

        html.light {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f2;
            --text-primary: #1a1a1c;
            --text-secondary: #6e6e73;
            --accent: #b8922e;
            --accent-hover: #c9a962;
            --border: #d1d1d6;
        }

        html.light h1,
        html.light .meta,
        html.light .preview-link,
        html.light .download-btn {
            color: #000000;
        }

        html.light .social-footer {
            background: #ffffff;
            border-top-color: #d1d1d6;
        }

        html.light .social-footer-links a {
            color: #3a3a3c;
        }

        html.light .social-footer-links a:hover {
            color: var(--accent);
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .bg-image {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .bg-image.loaded {
            opacity: 0.4;
        }

        html.light .bg-image.loaded {
            opacity: 0.60;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10, 10, 11, 0.3) 0%,
                rgba(10, 10, 11, 0.8) 100%
            );
        }

        html.light .bg-overlay {
            background: rgba(250, 250, 250, 0.35);
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards;
        }

        .meta {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.1s forwards;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: var(--accent);
            color: #0a0a0b;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        .download-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(201, 169, 98, 0.3);
        }

        .download-btn svg {
            width: 22px;
            height: 22px;
        }

        .preview-link {
            display: block;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .preview-link:hover {
            color: var(--accent);
        }

        .logo {
            width: auto;
            max-width: min(480px, 80vw);
            max-height: 200px;
            height: auto;
            object-fit: contain;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards;
        }

        .not-found {
            display: none;
        }

        .not-found.active {
            display: block;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .download-btn {
                padding: 16px 32px;
                font-size: 1rem;
            }
        }

        /* Social footer */
        .social-footer {
            text-align: center;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            width: 100%;
            margin-top: auto;
            position: relative;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .social-footer {
                position: fixed;
                bottom: 0;
                left: 0;
                margin-top: 0;
                background: var(--bg-primary);
                padding: 14px 24px;
            }
            html.light .social-footer {
                background: #ffffff;
            }
            .content {
                padding-bottom: 80px;
            }
        }

        .social-footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-footer-links a {
            color: var(--text-secondary);
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .social-footer-links a:hover {
            color: var(--accent);
        }

        .social-footer-links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <img class="bg-image" id="bgImage">
    <div class="bg-overlay"></div>
    
    <div class="content" id="content" style="display: none;">
        <img src="/api/logo" alt="Logo" class="logo">
        <h1 id="eventTitle"></h1>
        <p class="meta" id="photoCount"></p>
        <a class="download-btn" id="downloadBtn" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="downloadAllText"></span>
        </a>
        <a class="preview-link" id="previewLink" href="#">
            <span id="browseText"></span>
        </a>
    </div>
    
    <div class="content not-found" id="notFound">
        <h1 id="notFoundTitle"></h1>
        <p class="meta" id="notFoundText"></p>
    </div>

    <script>
        // Internationalization
        const translations = {
            en: {
                yourPhotos: 'Your Photos',
                photo: 'photo',
                photos: 'photos',
                downloadAll: 'Download All',
                browseIndividually: 'Or browse photos individually →',
                browseOnly: 'Browse photos →',
                notFoundTitle: 'Gallery Not Found',
                notFoundText: 'This gallery may have been removed or the link is incorrect.'
            },
            pt: {
                yourPhotos: 'Suas Fotos',
                photo: 'foto',
                photos: 'fotos',
                downloadAll: 'Baixar Todas',
                browseIndividually: 'Ou navegue pelas fotos individualmente →',
                browseOnly: 'Ver as fotos →',
                notFoundTitle: 'Galeria Não Encontrada',
                notFoundText: 'Esta galeria pode ter sido removida ou o link está incorreto.'
            },
            es: {
                yourPhotos: 'Tus Fotos',
                photo: 'foto',
                photos: 'fotos',
                downloadAll: 'Descargar Todas',
                browseIndividually: 'O navega por las fotos individualmente →',
                browseOnly: 'Ver las fotos →',
                notFoundTitle: 'Galería No Encontrada',
                notFoundText: 'Esta galería puede haber sido eliminada o el enlace es incorrecto.'
            },
            it: {
                yourPhotos: 'Le Tue Foto',
                photo: 'foto',
                photos: 'foto',
                downloadAll: 'Scarica Tutte',
                browseIndividually: 'Oppure sfoglia le foto singolarmente →',
                browseOnly: 'Sfoglia le foto →',
                notFoundTitle: 'Galleria Non Trovata',
                notFoundText: 'Questa galleria potrebbe essere stata rimossa o il link non è corretto.'
            },
            fr: {
                yourPhotos: 'Vos Photos',
                photo: 'photo',
                photos: 'photos',
                downloadAll: 'Tout Télécharger',
                browseIndividually: 'Ou parcourir les photos individuellement →',
                browseOnly: 'Parcourir les photos →',
                notFoundTitle: 'Galerie Introuvable',
                notFoundText: 'Cette galerie a peut-être été supprimée ou le lien est incorrect.'
            }
        };

        function getLocale() {
            const lang = navigator.language || navigator.userLanguage;
            const shortLang = lang.split('-')[0].toLowerCase();
            
            // Map pt-BR, pt-PT etc to pt
            if (shortLang === 'pt') return 'pt';
            if (shortLang === 'es') return 'es';
            if (shortLang === 'it') return 'it';
            if (shortLang === 'fr') return 'fr';
            return 'en';
        }

        const locale = getLocale();
        const t = translations[locale];

        // Set HTML lang attribute
        document.documentElement.lang = locale;

        // Set static translations
        document.getElementById('downloadAllText').textContent = t.downloadAll;
        document.getElementById('browseText').textContent = t.browseIndividually;
        document.getElementById('notFoundTitle').textContent = t.notFoundTitle;
        document.getElementById('notFoundText').textContent = t.notFoundText;


        // Apply site theme from server settings
        async function applyTheme() {
            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const s = await res.json();
                    document.documentElement.classList.toggle('light', s.theme === 'light');
                }
            } catch (e) {}
        }
        applyTheme();

        const galleryId = window.location.pathname.split('/').pop();
        
        async function loadGallery() {
            try {
                const res = await fetch(`/api/gallery/${galleryId}/info`);
                if (!res.ok) throw new Error('Not found');
                
                const data = await res.json();
                
                // Show content
                document.getElementById('content').style.display = 'block';
                
                // Set event title
                const title = (data.eventName && data.eventName !== 'Untitled Event') 
                    ? data.eventName 
                    : t.yourPhotos;
                document.getElementById('eventTitle').textContent = title;
                document.title = title;
                
                // Set photo count
                const count = data.fileCount;
                const photoWord = count === 1 ? t.photo : t.photos;
                document.getElementById('photoCount').textContent = `${count} ${photoWord}`;
                
                // Set download link
                document.getElementById('downloadBtn').href = `/api/gallery/${galleryId}/download`;

                // Hide download button and update browse text if downloads are disabled
                if (data.downloadsEnabled === false) {
                    document.getElementById('downloadBtn').style.display = 'none';
                    document.getElementById('browseText').textContent = t.browseOnly;
                }

                // Set preview link
                document.getElementById('previewLink').href = `/preview/${galleryId}`;
                
                // Load background
                if (data.background) {
                    const bgImg = document.getElementById('bgImage');
                    bgImg.onload = () => bgImg.classList.add('loaded');
                    bgImg.src = `/api/gallery/${galleryId}/background`;
                }
                
            } catch (err) {
                document.getElementById('notFound').classList.add('active');
            }
        }
        
        loadGallery();

        // Disable right-click on images to prevent casual saving
        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

                const container = document.getElementById('socialFooter');
                if (!container) return;

                const links = [];

                // website first
                if (s.website && s.website.trim()) {
                    const icon = SOCIAL_ICONS.website;
                    links.push(`<a href="${s.website.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                }

                // social networks
                const socials = s.socials || {};
                for (const [key, icon] of Object.entries(SOCIAL_ICONS)) {
                    if (key === 'website') continue;
                    const url = socials[key];
                    if (url && url.trim()) {
                        links.push(`<a href="${url.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                    }
                }

                if (links.length === 0) {
                    container.style.display = 'none';
                    return;
                }

                container.innerHTML = `<div class="social-footer-links">${links.join('')}</div>`;
            } catch (e) {}

        renderSocialFooter();
