<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-tertiary: #1c1c1f;
            --text-primary: #f2f2f4;
            --text-secondary: #9898a2;
            --accent: #c9a962;
            --accent-hover: #dfc07a;
            --border: #2d2d30;
        }

        html.light {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f2;
            --text-primary: #000000;
            --text-secondary: #1c1c1c;
            --accent: #c9a962;
            --accent-hover: #dfc07a;
            --border: #d1d1d6;
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 33vh;
            min-height: 200px;
            max-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .hero {
                height: 20vh;
                min-height: 140px;
                max-height: 200px;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .hero {
                height: 12vh;
                min-height: 80px;
                max-height: 120px;
            }
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .hero-bg.loaded {
            opacity: 0.5;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10, 10, 11, 0.2) 0%,
                rgba(10, 10, 11, 0.7) 70%,
                rgba(10, 10, 11, 1) 100%
            );
        }

        html.light .hero-overlay {
            background: linear-gradient(
                to bottom,
                rgba(250, 250, 250, 0.1) 0%,
                rgba(250, 250, 250, 0.6) 70%,
                rgba(250, 250, 250, 1) 100%
            );
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 24px;
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards;
        }

        .hero-meta {
            color: var(--text-secondary);
            font-size: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease 0.1s forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Actions Bar */
        .actions-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: color-mix(in srgb, var(--bg-primary) 90%, transparent);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .actions-bar {
                display: none;
            }
        }

        .actions-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .download-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--accent);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .download-all-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .download-all-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Gallery Grid */
        .gallery-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        @media (max-width: 768px) {
            .gallery-container {
                padding: 12px;
            }
        }

        @media (max-width: 480px) {
            .gallery-container {
                padding: 8px;
            }
        }

        .gallery-grid {
            columns: 4;
            column-gap: 10px;
        }

        @media (max-width: 1400px) {
            .gallery-grid { columns: 3; }
        }

        @media (max-width: 900px) {
            .gallery-grid { columns: 2; column-gap: 4px; }
        }

        @media (max-width: 560px) {
            .gallery-grid { columns: 1; }
        }

        .masonry-col {
            break-inside: avoid;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .masonry-col { margin-bottom: 4px; }
        }

        @media (max-width: 480px) {
            .masonry-col { margin-bottom: 2px; }
        }

        .photo-card {
            position: relative;
            overflow: hidden;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            break-inside: avoid;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .photo-card { margin-bottom: 4px; }
        }

        @media (max-width: 480px) {
            .photo-card { margin-bottom: 2px; }
        }

        .photo-card:hover {
            transform: scale(1.01);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .photo-card img.loaded {
            opacity: 1;
        }

        .photo-card .loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .photo-card .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.7) 0%,
                transparent 50%
            );
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px;
        }

        @media (max-width: 768px) {
            .photo-overlay {
                opacity: 0.6;
            }
        }

        .photo-card:hover .photo-overlay {
            opacity: 1;
        }

        .photo-name {
            display: none;
        }

        .photo-favorite {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .photo-favorite:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }

        .photo-favorite.favorited {
            background: rgba(220, 50, 80, 0.85);
            color: white;
        }

        .photo-favorite svg {
            width: 18px;
            height: 18px;
            transition: fill 0.2s;
        }

        .photo-favorite.favorited svg {
            fill: white;
        }

        .lightbox-favorite-btn {
            position: absolute;
            top: 20px;
            right: 140px;
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 1010;
        }

        @media (max-width: 768px) {
            .lightbox-favorite-btn {
                display: none;
            }
        }

        .lightbox-favorite-btn:hover {
            background: var(--bg-secondary);
            border-color: #dc3250;
            color: #dc3250;
        }

        .lightbox-favorite-btn.favorited {
            background: #dc3250;
            border-color: #dc3250;
            color: white;
        }

        .lightbox-favorite-btn svg {
            width: 20px;
            height: 20px;
            transition: fill 0.2s;
        }

        .lightbox-favorite-btn.favorited svg {
            fill: white;
        }

        /* Mobile action bar — visible only on mobile */
        .lightbox-mobile-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1020;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 12px 8px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        @media (max-width: 768px) {
            .lightbox-mobile-bar { display: flex; align-items: center; justify-content: space-around; }
        }

        .lightbox-mobile-bar button,
        .lightbox-mobile-bar a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.62rem;
            font-family: inherit;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 8px;
            transition: color 0.2s;
            min-width: 52px;
        }

        .lightbox-mobile-bar button:active,
        .lightbox-mobile-bar a:active { color: var(--accent); }

        .lightbox-mobile-bar button svg,
        .lightbox-mobile-bar a svg {
            width: 22px;
            height: 22px;
        }

        .lightbox-mobile-bar .mb-fav.favorited { color: #dc3250; }
        .lightbox-mobile-bar .mb-fav.favorited svg { fill: #dc3250; }

        .photo-download {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--accent);
            color: var(--bg-primary);
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .photo-download:hover {
            background: var(--accent-hover);
            transform: scale(1.1);
        }

        .photo-download svg {
            width: 18px;
            height: 18px;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 1010;
        }

        @media (max-width: 768px) {
            .lightbox-close {
                display: none;
            }
        }

        .lightbox-close:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 1010;
        }

        @media (max-width: 768px) {
            .lightbox-nav {
                display: none;
            }
        }

        .lightbox-nav:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-content {
            position: relative;
            max-width: calc(100vw - 160px);
            max-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1005;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: calc(100vh - 80px);
            object-fit: contain;
            border-radius: 4px;
        }

        .lightbox-download-btn {
            position: absolute;
            top: 20px;
            right: 80px;
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 1010;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .lightbox-download-btn {
                display: none;
            }
        }

        .lightbox-download-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
            color: var(--accent);
        }

        .lightbox-download-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Not Found */
        .not-found {
            display: none;
            text-align: center;
            padding: 100px 24px;
        }

        .not-found.active {
            display: block;
        }

        .not-found h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .not-found p {
            color: var(--text-secondary);
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 100px 24px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .lightbox-content {
                max-width: calc(100vw - 20px);
                max-height: calc(100vh - 80px);
                padding-bottom: 72px;
            }

            .lightbox-img {
                max-height: calc(100vh - 92px);
            }
        }

        /* Social footer */
        .social-footer {
            text-align: center;
            padding: 32px 24px 24px;
            border-top: 1px solid var(--border);
            margin-top: 48px;
        }

        .social-footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-footer-links a {
            color: var(--text-secondary);
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .social-footer-links a:hover {
            color: var(--accent);
        }

        .social-footer-links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero" id="heroSection" style="display: none;">
        <img class="hero-bg" id="heroBg">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="eventTitle"></h1>
            <p class="hero-meta" id="heroMeta"></p>
        </div>
    </section>

    <!-- Actions Bar -->
    <div class="actions-bar" id="actionsBar" style="display: none;">
        <div class="actions-left">
            <span id="photoCount"></span>
        </div>
        <a class="download-all-btn" id="downloadAllBtn" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="downloadAllText"></span>
        </a>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-container" id="galleryContainer" style="display: none;">
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <!-- Desktop Controls -->
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <a class="lightbox-download-btn" id="lightboxDownload" href="#" download title="Download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <button class="lightbox-favorite-btn" id="lightboxFavorite" onclick="toggleFavoriteFromLightbox()" title="Favorite">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)">‹</button>
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)">›</button>

        <!-- Photo -->
        <div class="lightbox-content">
            <img class="lightbox-img" id="lightboxImg">
        </div>

        <!-- Mobile Action Bar -->
        <div class="lightbox-mobile-bar">
            <button onclick="navigateLightbox(-1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Prev
            </button>
            <button class="mb-fav" id="mobileBarFav" onclick="toggleFavoriteFromLightbox()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Fav
            </button>
            <button onclick="closeLightbox()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Close
            </button>
            <a class="mb-dl" id="mobileBarDownload" href="#" download>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Save
            </a>
            <button onclick="navigateLightbox(1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Next
            </button>
        </div>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState"></div>

    <!-- Not Found -->
    <div class="not-found" id="notFound">
        <h1 id="notFoundTitle"></h1>
        <p id="notFoundText"></p>
    </div>

    <script>
        // Internationalization
        const translations = {
            en: {
                yourPhotos: 'Your Photos',
                photo: 'photo',
                photos: 'photos',
                downloadAll: 'Download All',
                download: 'Download',
                clickToPreview: 'Click any photo to preview',
                loadingGallery: 'Loading gallery...',
                notFoundTitle: 'Gallery Not Found',
                notFoundText: 'This gallery may have been removed or the link is incorrect.'
            },
            pt: {
                yourPhotos: 'Suas Fotos',
                photo: 'foto',
                photos: 'fotos',
                downloadAll: 'Baixar Todas',
                download: 'Baixar',
                clickToPreview: 'Clique em qualquer foto para visualizar',
                loadingGallery: 'Carregando galeria...',
                notFoundTitle: 'Galeria Não Encontrada',
                notFoundText: 'Esta galeria pode ter sido removida ou o link está incorreto.'
            },
            es: {
                yourPhotos: 'Tus Fotos',
                photo: 'foto',
                photos: 'fotos',
                downloadAll: 'Descargar Todas',
                download: 'Descargar',
                clickToPreview: 'Haz clic en cualquier foto para ver',
                loadingGallery: 'Cargando galería...',
                notFoundTitle: 'Galería No Encontrada',
                notFoundText: 'Esta galería puede haber sido eliminada o el enlace es incorrecto.'
            },
            it: {
                yourPhotos: 'Le Tue Foto',
                photo: 'foto',
                photos: 'foto',
                downloadAll: 'Scarica Tutte',
                download: 'Scarica',
                clickToPreview: 'Clicca su una foto per visualizzarla',
                loadingGallery: 'Caricamento galleria...',
                notFoundTitle: 'Galleria Non Trovata',
                notFoundText: 'Questa galleria potrebbe essere stata rimossa o il link non è corretto.'
            },
            fr: {
                yourPhotos: 'Vos Photos',
                photo: 'photo',
                photos: 'photos',
                downloadAll: 'Tout Télécharger',
                download: 'Télécharger',
                clickToPreview: 'Cliquez sur une photo pour l\'aperçu',
                loadingGallery: 'Chargement de la galerie...',
                notFoundTitle: 'Galerie Introuvable',
                notFoundText: 'Cette galerie a peut-être été supprimée ou le lien est incorrect.'
            }
        };

        function getLocale() {
            const lang = navigator.language || navigator.userLanguage;
            const shortLang = lang.split('-')[0].toLowerCase();
            
            if (shortLang === 'pt') return 'pt';
            if (shortLang === 'es') return 'es';
            if (shortLang === 'it') return 'it';
            if (shortLang === 'fr') return 'fr';
            return 'en';
        }

        const locale = getLocale();
        const t = translations[locale];

        // Set HTML lang attribute
        document.documentElement.lang = locale;

        // Set static translations
        document.getElementById('downloadAllText').textContent = t.downloadAll;
        document.getElementById('loadingState').textContent = t.loadingGallery;
        document.getElementById('notFoundTitle').textContent = t.notFoundTitle;
        document.getElementById('notFoundText').textContent = t.notFoundText;


        // Apply site theme from server settings
        async function applyTheme() {
            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const s = await res.json();
                    document.documentElement.classList.toggle('light', s.theme === 'light');
                }
            } catch (e) {}
        }
        applyTheme();

        const galleryId = window.location.pathname.split('/').pop();
        let photos = [];
        let currentPhotoIndex = 0;

        // Visitor identity — persisted in localStorage, shared across all galleries
        function getVisitorId() {
            let id = localStorage.getItem('delyvr_visitor_id');
            if (!id) {
                id = 'v-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36);
                localStorage.setItem('delyvr_visitor_id', id);
            }
            return id;
        }
        const visitorId = getVisitorId();

        // Favorites state — only this visitor's favorites
        let localFavorites = new Set();

        async function toggleFavorite(filename) {
            const wasFavorited = localFavorites.has(filename);
            // Optimistic update
            if (wasFavorited) { localFavorites.delete(filename); } else { localFavorites.add(filename); }

            // Update card button
            const btn = document.querySelector(`.photo-favorite[data-filename="${CSS.escape(filename)}"]`);
            if (btn) {
                btn.classList.toggle('favorited', !wasFavorited);
                btn.querySelector('svg').setAttribute('fill', wasFavorited ? 'none' : 'white');
            }

            // Update lightbox button if same photo is open
            if (photos[currentPhotoIndex] && photos[currentPhotoIndex].filename === filename) {
                const favBtn = document.getElementById('lightboxFavorite');
                favBtn.classList.toggle('favorited', !wasFavorited);
                favBtn.querySelector('svg').setAttribute('fill', wasFavorited ? 'none' : 'white');
                // Sync mobile bar fav button
                const mobileBarFav = document.getElementById('mobileBarFav');
                if (mobileBarFav) {
                    mobileBarFav.classList.toggle('favorited', !wasFavorited);
                    mobileBarFav.querySelector('svg').setAttribute('fill', wasFavorited ? 'none' : '#dc3250');
                }
            }

            // Sync to server
            try {
                await fetch(`/api/gallery/${galleryId}/favorites`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, visitorId })
                });
            } catch (e) {
                // Revert on network error
                if (wasFavorited) { localFavorites.add(filename); } else { localFavorites.delete(filename); }
                if (btn) {
                    btn.classList.toggle('favorited', wasFavorited);
                    btn.querySelector('svg').setAttribute('fill', wasFavorited ? 'white' : 'none');
                }
            }
        }

        function toggleFavoriteFromLightbox() {
            const photo = photos[currentPhotoIndex];
            if (photo) toggleFavorite(photo.filename);
        }

        async function loadGallery() {
            try {
                // Get gallery info
                const infoRes = await fetch(`/api/gallery/${galleryId}/info`);
                if (!infoRes.ok) throw new Error('Not found');
                const info = await infoRes.json();

                // Get photos list
                const photosRes = await fetch(`/api/gallery/${galleryId}/photos`);
                if (!photosRes.ok) throw new Error('Failed to load photos');
                const data = await photosRes.json();
                
                photos = data.photos;

                // Hide loading, show content
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('heroSection').style.display = 'flex';
                document.getElementById('actionsBar').style.display = 'flex';
                document.getElementById('galleryContainer').style.display = 'block';

                // Set title
                const title = (info.eventName && info.eventName !== 'Untitled Event') 
                    ? info.eventName 
                    : t.yourPhotos;
                document.getElementById('eventTitle').textContent = title;
                document.title = title;

                // Set meta
                const count = photos.length;
                const photoWord = count === 1 ? t.photo : t.photos;
                document.getElementById('heroMeta').textContent = `${count} ${photoWord} • ${t.clickToPreview}`;
                document.getElementById('photoCount').textContent = `${count} ${photoWord}`;

                // Set download all button
                document.getElementById('downloadAllBtn').href = `/api/gallery/${galleryId}/download`;

                // Hide download controls if downloads are disabled
                const downloadsEnabled = info.downloadsEnabled !== false;
                if (!downloadsEnabled) {
                    document.getElementById('downloadAllBtn').style.display = 'none';
                    document.getElementById('lightboxDownload').style.display = 'none';
                    const mobileBarDl = document.getElementById('mobileBarDownload');
                    if (mobileBarDl) mobileBarDl.style.display = 'none';
                }

                // Load background
                if (info.background) {
                    const heroBg = document.getElementById('heroBg');
                    heroBg.onload = () => heroBg.classList.add('loaded');
                    heroBg.src = `/api/gallery/${galleryId}/background`;
                }

                // Load this visitor's favorites from server
                try {
                    const favRes = await fetch(`/api/gallery/${galleryId}/favorites-public?visitorId=${encodeURIComponent(visitorId)}`);
                    if (favRes.ok) {
                        const favData = await favRes.json();
                        localFavorites = new Set(favData.favorites || []);
                    } else if (favRes.status === 404) {
                        // Gallery deleted — clean up localStorage
                        localStorage.removeItem('delyvr_visitor_id');
                    }
                } catch (e) { /* non-blocking */ }

                // Render gallery
                renderGallery(downloadsEnabled);

            } catch (err) {
                console.error(err);
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('notFound').classList.add('active');
            }
        }

        // Track downloadsEnabled for resize re-renders
        let _lastDownloadsEnabled = true;

        function getColCount() {
            const w = window.innerWidth;
            if (w >= 1400) return 4;
            if (w >= 900)  return 3;
            if (w >= 560)  return 2;
            return 1;
        }

        function renderGallery(downloadsEnabled = true) {
            _lastDownloadsEnabled = downloadsEnabled;
            const grid = document.getElementById('galleryGrid');

            // CSS columns handles layout — no JS column distribution needed
            grid.innerHTML = '';
            photos.forEach((photo, index) => {
                const isFav = localFavorites.has(photo.filename);

                const card = document.createElement('div');
                card.className = 'photo-card';
                card.onclick = () => openLightbox(index);

                const favFill = isFav ? 'white' : 'none';
                const favClass = isFav ? 'favorited' : '';
                const downloadBtn = downloadsEnabled ? `
                        <a class="photo-download" href="/api/gallery/${galleryId}/download/${encodeURIComponent(photo.filename)}" onclick="event.stopPropagation();" download>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 4v12m0 0l-4-4m4 4l4-4" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>` : '';

                card.innerHTML = `
                    <div class="loading"></div>
                    <img data-src="${photo.thumbnailUrl}" alt="">
                    <div class="photo-overlay">
                        <span class="photo-name"></span>
                        <button class="photo-favorite ${favClass}" data-filename="" data-index="${index}">
                            <svg viewBox="0 0 24 24" fill="${favFill}" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        ${downloadBtn}
                    </div>`;

                // Set text content safely via DOM (never via innerHTML)
                card.querySelector('.photo-name').textContent = photo.filename;
                const favBtn = card.querySelector('.photo-favorite');
                favBtn.dataset.filename = photo.filename;
                favBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(favBtn.dataset.filename);
                });

                const img = card.querySelector('img');
                img.onload = function() {
                    this.classList.add('loaded');
                    this.previousElementSibling.style.display = 'none';
                };

                grid.appendChild(card);
            });

            lazyLoadImages();
        }

        // CSS columns handles responsive layout — no resize re-render needed

        function lazyLoadImages() {
            const images = document.querySelectorAll('.photo-card img[data-src]');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: '200px' });

            images.forEach(img => observer.observe(img));
        }

        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function navigateLightbox(direction) {
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = photos.length - 1;
            if (currentPhotoIndex >= photos.length) currentPhotoIndex = 0;
            updateLightbox();
        }

        // Preload adjacent previews so navigation feels instant
        function preloadAdjacentPreviews(index) {
            const offsets = [-1, 1];
            offsets.forEach(offset => {
                const i = (index + offset + photos.length) % photos.length;
                if (photos[i]) {
                    const img = new Image();
                    img.src = photos[i].previewUrl || photos[i].url;
                }
            });
        }

        function updateLightbox() {
            const photo = photos[currentPhotoIndex];
            const downloadUrl = `/api/gallery/${galleryId}/download/${encodeURIComponent(photo.filename)}`;

            document.getElementById('lightboxImg').src = photo.previewUrl || photo.url;

            // Preload neighbours in background
            preloadAdjacentPreviews(currentPhotoIndex);

            // Desktop download button
            document.getElementById('lightboxDownload').href = downloadUrl;
            document.getElementById('lightboxDownload').setAttribute('download', photo.filename);

            // Mobile bar download link
            const mobileBarDl = document.getElementById('mobileBarDownload');
            if (mobileBarDl) {
                mobileBarDl.href = downloadUrl;
                mobileBarDl.setAttribute('download', photo.filename);
            }

            // Fav state — desktop button
            const isFav = localFavorites.has(photo.filename);
            const favBtn = document.getElementById('lightboxFavorite');
            favBtn.classList.toggle('favorited', isFav);
            favBtn.querySelector('svg').setAttribute('fill', isFav ? 'white' : 'none');

            // Fav state — mobile bar button
            const mobileBarFav = document.getElementById('mobileBarFav');
            if (mobileBarFav) {
                mobileBarFav.classList.toggle('favorited', isFav);
                mobileBarFav.querySelector('svg').setAttribute('fill', isFav ? '#dc3250' : 'none');
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        // Close lightbox on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });

        // Touch swipe support for mobile
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const lightbox = document.getElementById('lightbox');

        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        lightbox.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const minSwipeDistance = 50;

            // Only handle horizontal swipes (ignore vertical scrolling)
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minSwipeDistance) {
                if (deltaX > 0) {
                    // Swiped right - go to previous
                    navigateLightbox(-1);
                } else {
                    // Swiped left - go to next
                    navigateLightbox(1);
                }
            }
        }

        // Load gallery on page load
        loadGallery();

        // Disable right-click on images to prevent casual saving
        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

                    links.push(`<a href="${s.website.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                }

                const socials = s.socials || {};
                for (const [key, icon] of Object.entries(SOCIAL_ICONS)) {
                    if (key === 'website') continue;
                    const url = socials[key];
                    if (url && url.trim()) {
                        links.push(`<a href="${url.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                    }
                }

                if (links.length === 0) {
                    container.style.display = 'none';
                    return;
                }
