<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #0a0a0b;
            --bg2:     #111113;
            --bg3:     #161618;
            --border:  #1e1e21;
            --border2: #2a2a2e;
            --text:    #f0f0f2;
            --muted:   #4a4a4e;
            --muted2:  #3a3a3e;
            --accent:  #c9a962;
            --accent-h:#dfc07a;
        }

        html.light {
            --bg:      #f5f4f0;
            --bg2:     #eceae5;
            --bg3:     #e4e2dd;
            --border:  #dddbd6;
            --border2: #ccc9c3;
            --text:    #111110;
            --muted:   #888680;
            --muted2:  #aaa8a3;
            --accent:  #a07828;
            --accent-h:#c9a962;
        }

        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Instrument Sans', -apple-system, sans-serif;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* HEADER BG */
        .header-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.14;
            z-index: 0;
            pointer-events: none;
        }

        /* SITE HEADER */
        .site-header {
            position: relative;
            border-bottom: 1px solid var(--border);
            padding: 24px 32px 28px;
            text-align: center;
            overflow: hidden;
        }

        .site-header > *:not(.header-bg) {
            position: relative;
            z-index: 1;
        }

        .logo-wrap { text-align: center; margin-bottom: 20px; }
        .logo {
            display: inline-block;
            height: auto;
            max-height: 64px;
            max-width: min(320px, 70vw);
            width: auto;
            object-fit: contain;
        }

        .collection-title {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 6px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.6s ease 0.1s forwards;
        }

        .collection-meta {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.06em;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.2s forwards;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* DOWNLOAD ALL */
        .download-all-wrap {
            padding: 20px 32px 0;
            display: flex;
            justify-content: center;
        }

        .download-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted);
            padding: 9px 20px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.2s, color 0.2s;
        }

        .download-all-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .download-all-btn svg { width: 14px; height: 14px; }

        /* GALLERIES CONTAINER */
        .galleries-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 32px 64px;
        }

        /* GALLERY ROW — liste compacte */
        .gallery-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .gallery-row:first-child { border-top: 1px solid var(--border); }

        .gallery-row:hover .gallery-row-name { color: var(--accent); }

        .gallery-thumb {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 3px;
            background: var(--bg3);
            flex-shrink: 0;
        }

        .gallery-thumb-placeholder {
            width: 56px;
            height: 56px;
            border-radius: 3px;
            background: var(--bg3);
            border: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-thumb-placeholder svg {
            width: 18px;
            height: 18px;
            color: var(--muted2);
        }

        .gallery-row-info {
            flex: 1;
            min-width: 0;
        }

        .gallery-row-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
            margin-bottom: 3px;
        }

        .gallery-row-meta {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .gallery-row-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-browse {
            font-size: 11px;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.06em;
            padding: 6px 12px;
            border: 1px solid var(--border2);
            border-radius: 3px;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .btn-browse:hover { color: var(--text); border-color: var(--muted); }

        .btn-download-row {
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 0.06em;
            padding: 6px 12px;
            border: 1px solid var(--border2);
            border-radius: 3px;
            transition: background 0.2s;
            white-space: nowrap;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-download-row:hover { background: var(--bg3); }

        /* COPY FEEDBACK */
        .copy-feedback {
            font-size: 11px;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .copy-feedback.visible { opacity: 1; }

        /* NOT FOUND */
        .not-found {
            display: none;
            text-align: center;
            padding: 80px 32px;
        }

        .not-found.active { display: block; }

        .not-found h2 {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .not-found p { font-size: 13px; color: var(--muted); }

        /* SOCIAL FOOTER */
        .social-footer {
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            text-align: center;
        }

        .social-footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .social-footer-links a {
            color: var(--muted);
            display: flex;
            transition: color 0.2s;
        }

        .social-footer-links a:hover { color: var(--accent); }
        .social-footer-links svg { width: 18px; height: 18px; fill: currentColor; }

        @media (max-width: 640px) {
            .site-header { padding: 20px 20px 24px; }
            .galleries-container { padding: 24px 20px 48px; }
            .download-all-wrap { padding: 16px 20px 0; }
            .gallery-row-actions { flex-direction: column; gap: 6px; }
            .btn-browse, .btn-download-row { font-size: 10px; padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <div class="loading-state" id="loadingState" style="text-align:center;padding:80px 32px;font-size:13px;color:var(--muted)">Loading...</div>

    <div id="mainContent" style="display:none;">

        <header class="site-header">
            <img class="header-bg" id="headerBg" style="display:none" alt="">
            <div class="logo-wrap">
                <img src="/api/logo" alt="Logo" class="logo">
            </div>
            <h1 class="collection-title" id="collectionTitle"></h1>
            <p class="collection-meta" id="headerMeta"></p>
        </header>

        <div class="download-all-wrap" id="downloadAllWrap" style="display:none;">
            <button class="download-all-btn" onclick="downloadAll()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span id="downloadAllText"></span>
            </button>
        </div>

        <div class="galleries-container">
            <div id="galleriesGrid"></div>
        </div>

    </div>

    <div class="not-found" id="notFound">
        <h2 id="notFoundTitle"></h2>
        <p id="notFoundText"></p>
    </div>

    <footer class="social-footer" id="socialFooter"></footer>

    <script>
        const translations = {
            en: { loading:'Loading...', photos:'photos', photo:'photo', downloadAll:'Download All', browse:'Browse', download:'Download', copyLink:'Copy Link', copied:'Copied!', notFoundTitle:'Collection Not Found', notFoundText:'This collection may have been removed or the link is incorrect.' },
            fr: { loading:'Chargement...', photos:'photos', photo:'photo', downloadAll:'Tout télécharger', browse:'Parcourir', download:'Télécharger', copyLink:'Copier le lien', copied:'Copié !', notFoundTitle:'Collection introuvable', notFoundText:'Cette collection a peut-être été supprimée ou le lien est incorrect.' },
            es: { loading:'Cargando...', photos:'fotos', photo:'foto', downloadAll:'Descargar Todo', browse:'Ver fotos', download:'Descargar', copyLink:'Copiar enlace', copied:'¡Copiado!', notFoundTitle:'Colección No Encontrada', notFoundText:'Esta colección puede haber sido eliminada o el enlace es incorrecto.' },
            pt: { loading:'Carregando...', photos:'fotos', photo:'foto', downloadAll:'Baixar Tudo', browse:'Ver fotos', download:'Baixar', copyLink:'Copiar link', copied:'Copiado!', notFoundTitle:'Coleção Não Encontrada', notFoundText:'Esta coleção pode ter sido removida ou o link está incorreto.' },
            it: { loading:'Caricamento...', photos:'foto', photo:'foto', downloadAll:'Scarica Tutto', browse:'Sfoglia', download:'Scarica', copyLink:'Copia link', copied:'Copiato!', notFoundTitle:'Collezione Non Trovata', notFoundText:'Questa collezione potrebbe essere stata rimossa o il link non è corretto.' }
        };

        function getLocale() {
            const lang = (navigator.language || 'en').split('-')[0].toLowerCase();
            return ['fr','es','pt','it'].includes(lang) ? lang : 'en';
        }

        const locale = getLocale();
        const t = translations[locale];
        document.documentElement.lang = locale;
        document.getElementById('loadingState').textContent = t.loading;
        document.getElementById('notFoundTitle').textContent = t.notFoundTitle;
        document.getElementById('notFoundText').textContent = t.notFoundText;

        async function applyTheme() {
            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const s = await res.json();
                    document.documentElement.classList.toggle('light', s.theme === 'light');
                }
            } catch (e) {}
        }
        applyTheme();

        const collectionId = window.location.pathname.split('/').pop();

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        let _downloadUrl = '';

        function downloadAll() {
            if (_downloadUrl) window.location.href = _downloadUrl;
        }

        async function loadCollection() {
            try {
                const res = await fetch(`/api/collection/${collectionId}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

                document.title = data.name || 'Collection';
                document.getElementById('collectionTitle').textContent = data.name || '';

                const totalPhotos = (data.galleries || []).reduce((sum, g) => sum + (g.fileCount || 0), 0);
                const galleryCount = (data.galleries || []).length;
                document.getElementById('headerMeta').textContent =
                    `${galleryCount} ${galleryCount === 1 ? 'galerie' : 'galeries'} · ${totalPhotos} ${totalPhotos === 1 ? t.photo : t.photos}`;

                if (data.background) {
                    const bg = document.getElementById('headerBg');
                    bg.src = `/api/collection/${collectionId}/background`;
                    bg.style.display = 'block';
                }

                const hasDownloadable = (data.galleries || []).some(g => g.downloadsEnabled !== false);
                if (hasDownloadable) {
                    _downloadUrl = `/api/collection/${collectionId}/download`;
                    document.getElementById('downloadAllText').textContent = t.downloadAll;
                    document.getElementById('downloadAllWrap').style.display = 'flex';
                }

                const grid = document.getElementById('galleriesGrid');
                grid.innerHTML = '';

                (data.galleries || []).forEach(gallery => {
                    const row = document.createElement('div');
                    row.className = 'gallery-row';

                    const thumbHtml = gallery.background
                        ? `<img class="gallery-thumb" src="/api/gallery/${escapeHtml(gallery.id)}/background" alt="" loading="lazy">`
                        : `<div class="gallery-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;

                    const count = gallery.fileCount || 0;
                    const photoLabel = count === 1 ? t.photo : t.photos;

                    const browseUrl = `/preview/${escapeHtml(gallery.id)}?from=${escapeHtml(collectionId)}`;
                    const dlUrl = `/api/gallery/${escapeHtml(gallery.id)}/download`;

                    const dlBtn = gallery.downloadsEnabled !== false
                        ? `<button class="btn-download-row" onclick="event.stopPropagation();window.location.href='${dlUrl}'">${t.download}</button>`
                        : '';

                    row.innerHTML = `
                        ${thumbHtml}
                        <div class="gallery-row-info">
                            <div class="gallery-row-name">${escapeHtml(gallery.eventName || 'Untitled')}</div>
                            <div class="gallery-row-meta">${count} ${photoLabel}</div>
                        </div>
                        <div class="gallery-row-actions">
                            <a class="btn-browse" href="${browseUrl}">${t.browse}</a>
                            ${dlBtn}
                        </div>`;

                    row.addEventListener('click', (e) => {
                        if (e.target.closest('.gallery-row-actions')) return;
                        window.location.href = browseUrl;
                    });

                    grid.appendChild(row);
                });

            } catch (err) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('notFound').classList.add('active');
            }
        }

        loadCollection();

        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

                    facebook:  { label:'Facebook',  svg:'<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>' },

                    links.push(`<a href="${s.website.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                }
                const socials = s.socials || {};
                for (const [key, icon] of Object.entries(SOCIAL_ICONS)) {

                }
                if (links.length === 0) { container.style.display = 'none'; return; }
                container.innerHTML = `<div class="social-footer-links">${links.join('')}</div>`;
