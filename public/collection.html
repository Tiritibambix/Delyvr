<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-tertiary: #1c1c1f;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --accent: #c9a962;
            --accent-hover: #dfc07a;
            --border: #2d2d30;
        }

        html.light {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f2;
            --text-primary: #1a1a1c;
            --text-secondary: #6e6e73;
            --accent: #b8922e;
            --accent-hover: #c9a962;
            --border: #d1d1d6;
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            padding: 64px 24px 48px;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.18;
            z-index: 0;
            pointer-events: none;
        }

        .header > *:not(.header-bg) {
            position: relative;
            z-index: 1;
        }

        .logo {
            width: auto;
            max-width: min(480px, 80vw);
            max-height: 200px;
            height: auto;
            object-fit: contain;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.6s ease forwards;
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.7s ease 0.1s forwards;
        }

        .header-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.2s forwards;
        }

        .download-all-wrap {
            display: flex;
            justify-content: center;
            padding: 32px 24px 0;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.3s forwards;
        }

        .download-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: var(--accent);
            color: var(--bg-primary);
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .download-all-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .download-all-btn svg { width: 18px; height: 18px; }

        .galleries-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 64px;
        }

        @media (max-width: 768px) {
            .galleries-container {
                padding: 24px 16px 48px;
            }
        }

        @media (max-width: 480px) {
            .galleries-container {
                padding: 20px 12px 40px;
            }
        }

        .galleries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        @media (max-width: 768px) {
            .galleries-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .galleries-grid {
                gap: 12px;
            }
        }

        .gallery-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            color: inherit;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.6s ease forwards;
        }

        /* Cover — clickable, no icon placeholder */
        .gallery-card-cover {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: var(--bg-tertiary);
            position: relative;
            cursor: pointer;
            display: block;
            text-decoration: none;
        }

        .gallery-card-cover:hover img { transform: scale(1.03); }

        .gallery-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        .gallery-card-cover img.loaded { opacity: 1; }

        /* No placeholder icon — just a clean dark surface */

        .gallery-card-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .gallery-card-name {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .gallery-card-meta {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .gallery-card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 4px;
        }

        .btn-copy-link {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-copy-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-copy-link svg { width: 15px; height: 15px; }

        .btn-download-gallery {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--accent);
            color: var(--bg-primary);
            text-decoration: none;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-download-gallery:hover { background: var(--accent-hover); }

        .btn-download-gallery svg { width: 15px; height: 15px; }

        .not-found {
            display: none;
            text-align: center;
            padding: 100px 24px;
        }

        .not-found.active { display: block; }

        .not-found h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .not-found p { color: var(--text-secondary); }

        .loading-state {
            text-align: center;
            padding: 100px 24px;
            color: var(--text-secondary);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { padding: 40px 16px 32px; }
            .download-all-wrap { padding: 24px 16px 0; }
        }

        @media (max-width: 480px) {
            .header { padding: 30px 12px 24px; }
            .download-all-wrap { padding: 20px 12px 0; }
        }

        /* Social footer */
        .social-footer {
            text-align: center;
            padding: 32px 24px 24px;
            border-top: 1px solid var(--border);
            margin-top: 48px;
        }

        .social-footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-footer-links a {
            color: var(--text-secondary);
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .social-footer-links a:hover {
            color: var(--accent);
        }

        .social-footer-links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="loading-state" id="loadingState">Loading...</div>

    <div id="mainContent" style="display:none;">
        <div class="header">
            <img class="header-bg" id="headerBg" style="display:none" alt="">
            <img src="/api/logo" alt="Logo" class="logo">
            <h1 id="collectionTitle"></h1>
            <p class="header-meta" id="headerMeta"></p>
        </div>

        <div class="download-all-wrap" id="downloadAllWrap" style="display:none;">
            <button class="download-all-btn" onclick="downloadAll()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span id="downloadAllText"></span>
            </button>
        </div>

        <div class="galleries-container">
            <div class="galleries-grid" id="galleriesGrid"></div>
        </div>
    </div>

    <div class="not-found" id="notFound">
        <h1 id="notFoundTitle"></h1>
        <p id="notFoundText"></p>
    </div>

    <script>
        // Internationalisation — same languages as preview.html / customer.html
        const translations = {
            en: {
                loading: 'Loading...',
                gallery: 'gallery',
                galleries: 'galleries',
                downloadAll: 'Download All Galleries',
                photo: 'photo',
                photos: 'photos',
                copyLink: 'Copy Link',
                linkCopied: 'Copied!',
                download: 'Download',
                notFoundTitle: 'Collection Not Found',
                notFoundText: 'This collection may have been removed or the link is incorrect.'
            },
            fr: {
                loading: 'Chargement...',
                gallery: 'galerie',
                galleries: 'galeries',
                downloadAll: 'Tout télécharger',
                photo: 'photo',
                photos: 'photos',
                copyLink: 'Copier le lien',
                linkCopied: 'Copié\u00a0!',
                download: 'Télécharger',
                notFoundTitle: 'Collection introuvable',
                notFoundText: 'Cette collection a peut-être été supprimée ou le lien est incorrect.'
            },
            es: {
                loading: 'Cargando...',
                gallery: 'galería',
                galleries: 'galerías',
                downloadAll: 'Descargar todo',
                photo: 'foto',
                photos: 'fotos',
                copyLink: 'Copiar enlace',
                linkCopied: '¡Copiado!',
                download: 'Descargar',
                notFoundTitle: 'Colección no encontrada',
                notFoundText: 'Esta colección puede haber sido eliminada o el enlace es incorrecto.'
            },
            pt: {
                loading: 'Carregando...',
                gallery: 'galeria',
                galleries: 'galerias',
                downloadAll: 'Baixar tudo',
                photo: 'foto',
                photos: 'fotos',
                copyLink: 'Copiar link',
                linkCopied: 'Copiado!',
                download: 'Baixar',
                notFoundTitle: 'Coleção não encontrada',
                notFoundText: 'Esta coleção pode ter sido removida ou o link está incorreto.'
            },
            it: {
                loading: 'Caricamento...',
                gallery: 'galleria',
                galleries: 'gallerie',
                downloadAll: 'Scarica tutto',
                photo: 'foto',
                photos: 'foto',
                copyLink: 'Copia link',
                linkCopied: 'Copiato!',
                download: 'Scarica',
                notFoundTitle: 'Collezione non trovata',
                notFoundText: 'Questa collezione potrebbe essere stata rimossa o il link non è corretto.'
            }
        };

        function getLocale() {
            const lang = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
            return translations[lang] ? lang : 'en';
        }

        const locale = getLocale();
        const t = translations[locale];
        document.documentElement.lang = locale;

        document.getElementById('loadingState').textContent = t.loading;
        document.getElementById('notFoundTitle').textContent = t.notFoundTitle;
        document.getElementById('notFoundText').textContent = t.notFoundText;
        document.getElementById('downloadAllText').textContent = t.downloadAll;


        // Apply site theme from server settings
        async function applyTheme() {
            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const s = await res.json();
                    document.documentElement.classList.toggle('light', s.theme === 'light');
                }
            } catch (e) {}
        }
        applyTheme();

        const collectionId = window.location.pathname.split('/').pop();

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        function downloadAll() {
            window.location.href = `/api/collection/${collectionId}/download`;
        }

        function copyGalleryLink(galleryId, btn) {
            const url = `${window.location.origin}/preview/${galleryId}`;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url);
            } else {
                const ta = document.createElement('textarea');
                ta.value = url;
                ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
            const orig = btn.textContent;
            btn.textContent = t.linkCopied;
            setTimeout(() => btn.textContent = orig, 2000);
        }

        async function loadCollection() {
            try {
                const res = await fetch(`/api/collection/${collectionId}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

                document.title = data.name;
                document.getElementById('collectionTitle').textContent = data.name;

                if (data.background) {
                    const bg = document.getElementById('headerBg');
                    bg.src = data.background;
                    bg.style.display = 'block';
                }

                const count = data.galleries.length;
                const galleryWord = count === 1 ? t.gallery : t.galleries;
                document.getElementById('headerMeta').textContent = `${count} ${galleryWord}`;

                const anyDownloadable = data.galleries.some(g => g.downloadsEnabled !== false);
                if (anyDownloadable) {
                    document.getElementById('downloadAllWrap').style.display = 'flex';
                }

                const grid = document.getElementById('galleriesGrid');
                grid.innerHTML = '';

                data.galleries.forEach((gallery, i) => {
                    const card = document.createElement('div');
                    card.className = 'gallery-card';
                    card.style.animationDelay = `${0.05 * i + 0.3}s`;

                    const photoWord = gallery.fileCount === 1 ? t.photo : t.photos;
                    const downloadBtn = gallery.downloadsEnabled !== false
                        ? `<a class="btn-download-gallery" href="/api/gallery/${gallery.id}/download" download>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                ${t.download}
                            </a>`
                        : '';

                    card.innerHTML = `
                        <a class="gallery-card-cover" href="/preview/${gallery.id}">
                            ${gallery.background ? `<img data-src="${escapeHtml(gallery.background)}" alt="${escapeHtml(gallery.eventName)}">` : ''}
                        </a>
                        <div class="gallery-card-body">
                            <div class="gallery-card-name">${escapeHtml(gallery.eventName)}</div>
                            <div class="gallery-card-meta">${gallery.fileCount} ${photoWord}</div>
                            <div class="gallery-card-actions">
                                <button class="btn-copy-link" onclick="copyGalleryLink('${gallery.id}', this)">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2"/>
                                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                    </svg>
                                    ${t.copyLink}
                                </button>
                                ${downloadBtn}
                            </div>
                        </div>`;

                    // Lazy load cover image
                    const img = card.querySelector('img[data-src]');
                    if (img) {
                        const observer = new IntersectionObserver(entries => {
                            entries.forEach(entry => {
                                if (entry.isIntersecting) {
                                    img.src = img.dataset.src;
                                    img.onload = () => img.classList.add('loaded');
                                    observer.unobserve(img);
                                }
                            });
                        }, { rootMargin: '100px' });
                        observer.observe(img);
                    }

                    grid.appendChild(card);
                });

            } catch (err) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('notFound').classList.add('active');
            }
        }

        loadCollection();

        // Disable right-click on images to prevent casual saving
        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

        // Build social footer from settings
        async function renderSocialFooter() {
            try {
                const res = await fetch('/api/settings');
                if (!res.ok) return;
                const s = await res.json();

                const SOCIAL_ICONS = {

                    instagram: { label: 'Instagram', svg: '<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>' },

                const container = document.getElementById('socialFooter');
                if (!container) return;

                const links = [];

                if (s.website && s.website.trim()) {
                    const icon = SOCIAL_ICONS.website;
                    links.push(`<a href="${s.website.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                }

                const socials = s.socials || {};
                for (const [key, icon] of Object.entries(SOCIAL_ICONS)) {
                    if (key === 'website') continue;
                    const url = socials[key];
                    if (url && url.trim()) {
                        links.push(`<a href="${url.trim()}" target="_blank" rel="noopener" aria-label="${icon.label}">${icon.svg}</a>`);
                    }
                }

                if (links.length === 0) {
                    container.style.display = 'none';
                    return;
                }

                container.innerHTML = `<div class="social-footer-links">${links.join('')}</div>`;
            } catch (e) {}
