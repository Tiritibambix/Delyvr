<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Fraunces:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-tertiary: #1c1c1f;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --accent: #c9a962;
            --accent-hover: #dfc07a;
            --border: #2d2d30;
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 64px 24px 48px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            height: 64px;
            width: auto;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.6s ease forwards;
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.7s ease 0.1s forwards;
        }

        .header-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.2s forwards;
        }

        /* Download all button */
        .download-all-wrap {
            display: flex;
            justify-content: center;
            padding: 32px 24px 0;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.3s forwards;
        }

        .download-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: var(--accent);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .download-all-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .download-all-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Gallery cards grid */
        .galleries-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 64px;
        }

        .galleries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .gallery-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.6s ease forwards;
        }

        .gallery-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .gallery-card-cover {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: var(--bg-tertiary);
            position: relative;
        }

        .gallery-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-card-cover img.loaded {
            opacity: 1;
        }

        .gallery-card-cover-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--border);
        }

        .gallery-card-cover-placeholder svg {
            width: 48px;
            height: 48px;
        }

        .gallery-card-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .gallery-card-name {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .gallery-card-meta {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .gallery-card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 4px;
        }

        .btn-browse {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--accent);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-browse:hover { background: var(--accent-hover); }

        .btn-download-gallery {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 16px;
            background: transparent;
            color: var(--text-primary);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-download-gallery:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-browse svg, .btn-download-gallery svg {
            width: 15px;
            height: 15px;
        }

        /* Not found */
        .not-found {
            display: none;
            text-align: center;
            padding: 100px 24px;
        }

        .not-found.active { display: block; }

        .not-found h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .not-found p { color: var(--text-secondary); }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 100px 24px;
            color: var(--text-secondary);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .header { padding: 40px 16px 32px; }
            .galleries-container { padding: 24px 16px 48px; }
            .galleries-grid { grid-template-columns: 1fr; gap: 16px; }
            .download-all-wrap { padding: 24px 16px 0; }
        }
    </style>
</head>
<body>

    <div class="loading-state" id="loadingState">Loading...</div>

    <div id="mainContent" style="display:none;">
        <div class="header">
            <img src="/api/logo" alt="Logo" class="logo">
            <h1 id="collectionTitle"></h1>
            <p class="header-meta" id="headerMeta"></p>
        </div>

        <div class="download-all-wrap" id="downloadAllWrap" style="display:none;">
            <button class="download-all-btn" id="downloadAllBtn" onclick="downloadAll()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Download All Galleries
            </button>
        </div>

        <div class="galleries-container">
            <div class="galleries-grid" id="galleriesGrid"></div>
        </div>
    </div>

    <div class="not-found" id="notFound">
        <h1>Collection Not Found</h1>
        <p>This collection may have been removed or the link is incorrect.</p>
    </div>

    <script>
        const collectionId = window.location.pathname.split('/').pop();

        async function downloadAll() {
            window.location.href = `/api/collection/${collectionId}/download`;
        }

        async function loadCollection() {
            try {
                const res = await fetch(`/api/collection/${collectionId}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

                document.title = data.name;
                document.getElementById('collectionTitle').textContent = data.name;

                const count = data.galleries.length;
                document.getElementById('headerMeta').textContent =
                    `${count} ${count === 1 ? 'gallery' : 'galleries'}`;

                // Show download all only if at least one gallery has downloads enabled
                const anyDownloadable = data.galleries.some(g => g.downloadsEnabled !== false);
                if (anyDownloadable) {
                    document.getElementById('downloadAllWrap').style.display = 'flex';
                }

                const grid = document.getElementById('galleriesGrid');
                grid.innerHTML = '';

                data.galleries.forEach((gallery, i) => {
                    const card = document.createElement('a');
                    card.href = `/preview/${gallery.id}`;
                    card.className = 'gallery-card';
                    card.style.animationDelay = `${0.05 * i + 0.3}s`;

                    const photoWord = gallery.fileCount === 1 ? 'photo' : 'photos';
                    const downloadBtn = gallery.downloadsEnabled !== false
                        ? `<a class="btn-download-gallery" href="/api/gallery/${gallery.id}/download" download onclick="event.stopPropagation();">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Download
                            </a>`
                        : '';

                    card.innerHTML = `
                        <div class="gallery-card-cover">
                            ${gallery.background
                                ? `<img data-src="${gallery.background}" alt="${gallery.eventName}">`
                                : ''}
                            <div class="gallery-card-cover-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <path d="M21 15l-5-5L5 21"/>
                                </svg>
                            </div>
                        </div>
                        <div class="gallery-card-body">
                            <div class="gallery-card-name">${gallery.eventName}</div>
                            <div class="gallery-card-meta">${gallery.fileCount} ${photoWord}</div>
                            <div class="gallery-card-actions">
                                <a class="btn-browse" href="/preview/${gallery.id}" onclick="event.stopPropagation();">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                                        <circle cx="8.5" cy="8.5" r="1.5"/>
                                        <path d="M21 15l-5-5L5 21"/>
                                    </svg>
                                    Browse
                                </a>
                                ${downloadBtn}
                            </div>
                        </div>`;

                    // Lazy load cover image
                    const img = card.querySelector('img[data-src]');
                    if (img) {
                        const observer = new IntersectionObserver(entries => {
                            entries.forEach(entry => {
                                if (entry.isIntersecting) {
                                    img.src = img.dataset.src;
                                    img.onload = () => img.classList.add('loaded');
                                    observer.unobserve(img);
                                }
                            });
                        }, { rootMargin: '100px' });
                        observer.observe(img);
                    }

                    grid.appendChild(card);
                });

            } catch (err) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('notFound').classList.add('active');
            }
        }

        loadCollection();
    </script>
</body>
</html>
