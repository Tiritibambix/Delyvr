name: Build and Push Docker Image - Delyvr

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tiritibambix/Delyvr
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          echo "short_commit=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            tiritibambix/delyvr:${{ steps.meta.outputs.branch }}-latest
            tiritibambix/delyvr:${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.short_commit }}
            tiritibambix/delyvr:${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.date_tag }}
          platforms: linux/amd64 #,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max